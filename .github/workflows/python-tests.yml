name: MEOK OS - Python Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'meok-attestation-api/**'
      - 'scripts/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio --quiet
          if [ -f meok-attestation-api/requirements.txt ]; then
            pip install -r meok-attestation-api/requirements.txt --quiet
          fi

      - name: Run tests
        run: |
          if [ -d meok-attestation-api/tests ]; then
            cd meok-attestation-api
            pytest tests/ -v
          else
            echo "No tests directory found, skipping"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install ruff

      - name: Run ruff
        run: ruff check meok-attestation-api/ scripts/ --ignore E501 || true
